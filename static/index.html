<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KmerSource AI - Assistant Chine-Cameroun</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container { max-width: 900px; margin: 30px auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
        .chat-header { background: linear-gradient(135deg, #007bff, #0056b3); color: white; padding: 20px; border-radius: 15px 15px 0 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 25px; background: #fdfdfd; }
        .message { margin-bottom: 20px; padding: 12px 18px; border-radius: 18px; max-width: 85%; line-height: 1.5; }
        .user-message { background: #007bff; color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px; }
        .ai-message { background: #f1f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ai-message p:last-child { margin-bottom: 0; }
        .chat-input { padding: 20px; border-top: 1px solid #eee; display: flex; background: white; border-radius: 0 0 15px 15px; }
        .chat-input input { flex: 1; border-radius: 25px; padding: 12px 25px; border: 2px solid #eee; margin-right: 15px; outline: none; transition: border-color 0.3s; }
        .chat-input input:focus { border-color: #007bff; }
        .chat-input button { border-radius: 25px; padding: 10px 30px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header text-center">
            <h2 class="mb-0">🇨🇲 KmerSource AI</h2>
            <p class="mb-0 opacity-75">Votre expert logistique Chine-Cameroun en temps réel</p>
        </div>
        <div class="chat-messages d-flex flex-column" id="chatMessages">
            <div class="message ai-message">👋 Bonjour ! Je suis <strong>KmerSource AI</strong>. Je peux vous aider à trouver des fournisseurs en Chine, comparer les tarifs de fret et suivre vos colis jusqu'au Cameroun. <br><br>Essayez de me demander un <strong>"scan complet"</strong> !</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Posez votre question ici..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn">Envoyer</button>
        </div>
    </div>

    <script>
        function appendMessage(content, className, isMarkdown = false) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${className}`;

            if (isMarkdown) {
                div.innerHTML = marked.parse(content);
            } else {
                div.innerText = content;
            }

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message) return;

            appendMessage(message, 'user-message');
            input.value = '';
            input.disabled = true;
            btn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                appendMessage(data.response, 'ai-message', true);
            } catch (error) {
                appendMessage("❌ Erreur de connexion. Veuillez réessayer.", 'ai-message text-danger');
            } finally {
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
